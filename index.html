<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NDS Hub - Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            padding: 2rem;
        }
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 {
            font-size: 2.6rem;
            background: linear-gradient(135deg, #f5e6b2, #ffcc66, #ffaa33);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .toolbar {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }
        .library-btn {
            background: linear-gradient(135deg, #7c5cff, #5a3cc9);
            border: none;
            border-radius: 30px;
            padding: 10px 24px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        .game-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(25, 34, 55, 0.9);
            border: 1px solid rgba(255, 204, 102, 0.25);
            border-radius: 24px;
            padding: 0.9rem 1.2rem;
            cursor: pointer;
        }
        .game-card:hover { border-color: #ffcc66; background: #1e2a44; }
        .game-icon { font-size: 2rem; min-width: 52px; }
        .game-title { font-weight: 700; color: #f5e6c4; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: rgba(15, 15, 25, 0.95);
            border: 1px solid rgba(124, 92, 255, 0.3);
            border-radius: 20px;
            padding: 20px;
            width: min(400px, 90vw);
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-header { margin-bottom: 15px; }
        .modal-title { color: #ffcc66; font-size: 20px; font-weight: 700; }
        .rom-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        .rom-item:hover { background: rgba(124, 92, 255, 0.2); }
        .rom-name { color: white; }
        .modal-close {
            margin-top: 15px;
            padding: 10px;
            background: #7c5cff;
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🎮 NDS HUB</h1>
</div>

<div class="toolbar">
    <button class="library-btn" id="libraryBtn">📚 OPEN LIBRARY</button>
</div>

<div id="gamesContainer" class="games-grid"></div>

<div class="modal" id="libraryModal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title">ROM LIBRARY</div>
        </div>
        <div id="romList"></div>
        <button class="modal-close" id="closeModalBtn">Close</button>
    </div>
</div>

<script>
    // ============ YOUR GAMES - PUT YOUR FILE IDs HERE ============
    // To get a File ID: Right-click file in Google Drive → "Get link"
    // The ID is the long string in: https://drive.google.com/file/d/YOUR_ID_HERE/view
    
    const games = [
        { id: "", name: "MegaMan ZX" },
        { id: "", name: "Mario vs Donkey Kong 2" },
        { id: "", name: "Animal Crossing - Wild World" },
        { id: "", name: "Kirby Super Stars Ultra" },
        { id: "", name: "Castlevania - Dawn of Sorrow" },
        { id: "", name: "New Super Mario Bros" }
    ];
    
    // Display games in the library modal
    function renderLibrary() {
        const romList = document.getElementById('romList');
        
        if (!romList) return;
        
        romList.innerHTML = '';
        
        games.forEach((game, index) => {
            const gameDiv = document.createElement('div');
            gameDiv.className = 'rom-item';
            gameDiv.innerHTML = `
                <span class="rom-name">${game.name}</span>
                <span style="color:${game.id ? '#4cd964' : '#ff5e5e'}">${game.id ? '✅' : '❌ No ID'}</span>
            `;
            gameDiv.onclick = () => {
                if (game.id) {
                    alert(`Playing: ${game.name}\nFile ID: ${game.id}\n\n(Emulator would launch here)`);
                } else {
                    alert(`No File ID set for "${game.name}".\n\nRight-click the file in Google Drive → "Get link" → copy the ID.`);
                }
            };
            romList.appendChild(gameDiv);
        });
    }
    
    // Modal controls
    const modal = document.getElementById('libraryModal');
    document.getElementById('libraryBtn').onclick = () => {
        renderLibrary();
        modal.classList.add('show');
    };
    document.getElementById('closeModalBtn').onclick = () => modal.classList.remove('show');
    modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('show'); };
    
    console.log('NDS Hub loaded. Games in library:', games.length);
</script>
</body>
</html>
