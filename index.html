<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NDS Hub | Nintendo DS Game Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        /* ===== GAME SELECTION SCREEN (fanterOS style) ===== */
        .game-selection {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            z-index: 20000;
            overflow-y: auto;
            padding: 2rem 1.5rem;
            transition: opacity 0.3s ease;
        }

        .game-selection.hide {
            opacity: 0;
            pointer-events: none;
        }

        .game-selection .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .game-selection .header h1 {
            font-size: 2.6rem;
            background: linear-gradient(135deg, #f5e6b2, #ffcc66, #ffaa33);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            margin-bottom: 0.3rem;
        }

        .game-selection .header p {
            color: #8e9bbe;
            font-size: 0.9rem;
        }

        .game-selection .badge-row {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin-top: 0.8rem;
            flex-wrap: wrap;
        }

        .game-selection .badge {
            background: rgba(255, 204, 102, 0.15);
            border: 1px solid rgba(255, 204, 102, 0.3);
            border-radius: 40px;
            padding: 4px 14px;
            font-size: 0.7rem;
            color: #ffdd99;
        }

        .game-selection .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            align-items: center;
        }

        .game-selection .search-box {
            background: rgba(20, 28, 48, 0.8);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 204, 102, 0.35);
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            transition: all 0.2s;
        }

        .game-selection .search-box:focus-within {
            border-color: #ffcc66;
            box-shadow: 0 0 12px rgba(255, 204, 102, 0.2);
        }

        .game-selection .search-box span {
            font-size: 1.1rem;
        }

        .game-selection #searchInput {
            background: transparent;
            border: none;
            color: #f0e6d0;
            font-size: 0.9rem;
            width: 260px;
            outline: none;
        }

        .game-selection #searchInput::placeholder {
            color: #6a7a9e;
        }

        .game-selection .stats-badge {
            background: #1e2a3a;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #ffdd99;
            font-weight: 500;
            border: 1px solid rgba(255, 204, 102, 0.3);
        }

        .game-selection .stats-badge span {
            color: white;
            font-weight: bold;
            margin: 0 4px;
        }

        .game-selection .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .game-selection .game-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: linear-gradient(115deg, rgba(25, 34, 55, 0.9), rgba(18, 24, 42, 0.95));
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 204, 102, 0.25);
            border-radius: 24px;
            padding: 0.9rem 1.2rem;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .game-selection .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 204, 102, 0.12), transparent);
            transition: left 0.4s ease;
        }

        .game-selection .game-card:hover::before {
            left: 100%;
        }

        .game-selection .game-card:hover {
            transform: translateY(-4px) scale(1.01);
            border-color: #ffcc66;
            background: linear-gradient(115deg, #1e2a44, #141c30);
            box-shadow: 0 14px 28px -8px rgba(0,0,0,0.5), 0 0 0 1px rgba(255, 204, 102, 0.2) inset;
        }

        .game-selection .game-icon {
            font-size: 2rem;
            min-width: 52px;
            text-align: center;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .game-selection .game-info {
            flex: 1;
        }

        .game-selection .game-title {
            font-weight: 700;
            font-size: 0.95rem;
            color: #f5e6c4;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .game-selection .game-badge {
            background: rgba(255, 204, 102, 0.18);
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 20px;
            color: #ffdd99;
        }

        .game-selection .arrow-hint {
            opacity: 0.5;
            font-size: 0.75rem;
            transition: 0.2s;
        }

        .game-selection .game-card:hover .arrow-hint {
            opacity: 1;
            transform: translateX(3px);
            color: #ffcc66;
        }

        .game-selection .no-results {
            text-align: center;
            grid-column: 1 / -1;
            padding: 3rem;
            background: rgba(0,0,0,0.2);
            border-radius: 48px;
            color: #9eafcf;
        }

        .game-selection .footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.7rem;
            color: #5c6e8c;
            border-top: 1px solid rgba(255, 204, 102, 0.15);
            padding-top: 1.8rem;
        }

        /* ===== FULLSCREEN EMULATOR MODAL ===== */
        .fullscreen-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            z-index: 10000;
            flex-direction: column;
        }
        .fullscreen-modal.active {
            display: flex;
        }
        .fullscreen-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 204, 102, 0.3);
            z-index: 10;
        }
        .fullscreen-title {
            color: #ffdd99;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .fullscreen-close {
            background: none;
            border: none;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            padding: 0 10px;
            transition: 0.2s;
        }
        .fullscreen-close:hover {
            color: #ffcc66;
            transform: scale(1.1);
        }
        .fullscreen-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }
        #fullscreenEmulator {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #fullscreenEmulator canvas {
            max-width: 100%;
            max-height: calc(100vh - 60px);
            object-fit: contain;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 640px) {
            .game-selection { padding: 1rem; }
            .game-selection .games-grid { grid-template-columns: 1fr; }
            .game-selection .game-card { padding: 0.7rem 1rem; }
            .game-selection .game-icon { font-size: 1.6rem; min-width: 45px; }
            .game-selection .search-box #searchInput { width: 160px; }
        }
    </style>
</head>
<body>

<!-- ===== GAME SELECTION SCREEN (fanterOS style) ===== -->
<div id="gameSelection" class="game-selection">
    <div class="header">
        <h1>🎮 NDS HUB</h1>
        <p>Nintendo DS — dual-screen gaming collection</p>
        <div class="badge-row">
            <div class="badge">🎮 Full NDS Library</div>
            <div class="badge">⚡ Fullscreen Play</div>
            <div class="badge">💾 Save States</div>
            <div class="badge">🖱️ Touch Support</div>
        </div>
    </div>

    <div class="toolbar">
        <div class="search-box">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="search DS games...">
        </div>
        <div class="stats-badge">
            📚 <span id="totalCount">0</span> DS games
        </div>
    </div>

    <div id="gamesContainer" class="games-grid"></div>

    <div class="footer">
        <span>🎮 NDS Hub • Click any game to play in fullscreen</span>
    </div>
</div>

<!-- ===== FULLSCREEN EMULATOR MODAL ===== -->
<div id="fullscreenModal" class="fullscreen-modal">
    <div class="fullscreen-header">
        <span class="fullscreen-title" id="fullscreenGameTitle">Nintendo DS Emulator</span>
        <button class="fullscreen-close" id="fullscreenCloseBtn">✕</button>
    </div>
    <div class="fullscreen-content">
        <div id="fullscreenEmulator"></div>
    </div>
</div>

<script>
    const FOLDER_ID = '12bIfSUq3ZWWZ-1S0XAY7-e5tu5Sy6VDD';
    const API_KEY = 'AIzaSyAL1l3O7Jr8M635xZsxT3jI9yE-yp13KTc';
    
    let romLibrary = [];
    let currentRomName = '';
    let currentRomBlob = null;
    
    const CORS_PROXIES = ['https://api.allorigins.win/raw?url=', 'https://corsproxy.io/?', 'https://api.codetabs.com/v1/proxy?quest='];
    
    // IndexedDB cache
    let db = null;
    (function openDB() {
        try {
            const req = indexedDB.open('nds-rom-cache', 1);
            req.onupgradeneeded = e => e.target.result.createObjectStore('roms');
            req.onsuccess = e => { db = e.target.result; };
        } catch {}
    })();
    
    function getCachedRom(fileId) {
        if (!db) return Promise.resolve(null);
        return new Promise(resolve => {
            try {
                const tx = db.transaction('roms', 'readonly');
                const req = tx.objectStore('roms').get(fileId);
                req.onsuccess = () => resolve(req.result || null);
                req.onerror = () => resolve(null);
            } catch { resolve(null); }
        });
    }
    
    function cacheRom(fileId, blob) {
        if (!db) return;
        try {
            const tx = db.transaction('roms', 'readwrite');
            tx.objectStore('roms').put(blob, fileId);
        } catch {}
    }
    
    // Library cache
    const LIBRARY_CACHE_KEY = 'nds-library-cache';
    const LIBRARY_CACHE_TTL = 3600000;
    
    function getCachedLibrary() {
        try {
            const raw = localStorage.getItem(LIBRARY_CACHE_KEY);
            if (!raw) return null;
            const { files, timestamp } = JSON.parse(raw);
            if (Date.now() - timestamp > LIBRARY_CACHE_TTL) return null;
            return files;
        } catch { return null; }
    }
    
    function setCachedLibrary(files) {
        try { localStorage.setItem(LIBRARY_CACHE_KEY, JSON.stringify({ files, timestamp: Date.now() })); } catch {}
    }
    
    function parseEmbedHTML(html) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const files = [];
        doc.querySelectorAll('.flip-entry').forEach(entry => {
            const titleEl = entry.querySelector('.flip-entry-title');
            const linkEl = entry.querySelector('a');
            if (!titleEl || !linkEl) return;
            const name = titleEl.textContent.trim();
            const href = linkEl.getAttribute('href') || '';
            const idMatch = href.match(/\/d\/([^/]+)/);
            if (!idMatch) return;
            const ln = name.toLowerCase();
            if (!ln.endsWith('.nds') && !ln.endsWith('.zip')) return;
            files.push({
                id: idMatch[1],
                name: name.replace(/\.(nds|zip)$/i, ''),
                ext: ln.endsWith('.zip') ? 'zip' : 'nds',
                size: ln.endsWith('.zip') ? 'ZIP' : 'NDS'
            });
        });
        files.sort((a, b) => a.name.localeCompare(b.name, undefined, { sensitivity: 'base' }));
        return files;
    }
    
    async function fetchWithProxyRace(url, validate, timeout = 30000) {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeout);
        const attempts = CORS_PROXIES.map(async proxy => {
            const resp = await fetch(proxy + encodeURIComponent(url), { signal: controller.signal });
            if (!resp.ok) throw new Error('not ok');
            const result = await validate(resp);
            if (!result) throw new Error('validation failed');
            return result;
        });
        try {
            const result = await Promise.any(attempts);
            clearTimeout(timer);
            controller.abort();
            return result;
        } catch {
            clearTimeout(timer);
            return null;
        }
    }
    
    async function fetchDriveFolder() {
        const cached = getCachedLibrary();
        if (cached && cached.length > 0) return cached;
        
        const embedUrl = `https://drive.google.com/embeddedfolderview?id=${FOLDER_ID}`;
        const html = await fetchWithProxyRace(embedUrl, async (resp) => {
            const text = await resp.text();
            return text.includes('flip-entry') ? text : null;
        }, 15000);
        
        if (!html) throw new Error('Could not load folder. Check that the folder is public.');
        const files = parseEmbedHTML(html);
        setCachedLibrary(files);
        return files;
    }
    
    async function downloadRomBlob(fileId, statusText) {
        const cached = await getCachedRom(fileId);
        if (cached && cached.size > 1000) {
            statusText.textContent = 'Loaded from cache ⚡';
            return cached;
        }
        
        statusText.textContent = 'Downloading...';
        
        try {
            const directUrl = `https://drive.usercontent.google.com/download?id=${fileId}&export=download&confirm=t`;
            const resp = await fetch(directUrl);
            if (resp.ok) {
                const blob = await resp.blob();
                if (blob.size > 1000 && !blob.type.includes('text/html')) return blob;
            }
        } catch (e) {}
        
        const proxyUrl = `https://drive.google.com/uc?export=download&id=${fileId}`;
        let blob = await fetchWithProxyRace(proxyUrl, async (resp) => {
            const data = await resp.blob();
            if (data.size > 50000 && !data.type.includes('text/html')) return data;
            const text = await data.text();
            if (text.includes('confirm=') || text.includes('download_warning')) {
                const confirmUrl = `https://drive.google.com/uc?export=download&confirm=t&id=${fileId}`;
                return await fetchWithProxyRace(confirmUrl, async (r) => {
                    const b = await r.blob();
                    return b.size > 1000 ? b : null;
                }, 45000);
            }
            return null;
        }, 60000);
        
        if (!blob || blob.size < 1000) throw new Error('Download failed');
        return blob;
    }
    
    async function loadRom(fileId, name) {
        document.getElementById('fullscreenGameTitle').textContent = `${name} (Nintendo DS)`;
        document.getElementById('fullscreenModal').classList.add('active');
        
        // Hide the selection screen (fade it out)
        const selectionScreen = document.getElementById('gameSelection');
        selectionScreen.classList.add('hide');
        
        try {
            let blob = await downloadRomBlob(fileId, { textContent: '' });
            cacheRom(fileId, blob);
            currentRomName = name;
            currentRomBlob = blob;
            launchFullscreenEmulator(URL.createObjectURL(blob), name);
        } catch (error) {
            console.error('Load error:', error);
            alert('Failed to load ROM: ' + error.message);
            document.getElementById('fullscreenModal').classList.remove('active');
            selectionScreen.classList.remove('hide');
        }
    }
    
    function launchFullscreenEmulator(romUrl, gameName) {
        const fullscreenEmulatorDiv = document.getElementById('fullscreenEmulator');
        fullscreenEmulatorDiv.innerHTML = '';
        
        window.EJS_player = '#fullscreenEmulator';
        window.EJS_core = 'nds';
        window.EJS_gameName = gameName;
        window.EJS_color = '#c41e3a';
        window.EJS_startOnLoaded = true;
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        window.EJS_gameUrl = romUrl;
        window.EJS_buttons = { playPause: false, restart: true, mute: false, settings: true, fullscreen: true, saveState: true, loadState: true };
        
        const oldScript = document.querySelector('script[src*="emulatorjs"][src*="loader"]');
        if (oldScript) oldScript.remove();
        
        const script = document.createElement('script');
        script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
        document.body.appendChild(script);
    }
    
    function closeFullscreenEmulator() {
        const fullscreenModal = document.getElementById('fullscreenModal');
        const fullscreenEmulatorDiv = document.getElementById('fullscreenEmulator');
        const selectionScreen = document.getElementById('gameSelection');
        
        fullscreenModal.classList.remove('active');
        fullscreenEmulatorDiv.innerHTML = '';
        selectionScreen.classList.remove('hide');
        
        if (window.EJS_emulator) {
            try { window.EJS_emulator.destroy?.(); } catch(e) {}
            window.EJS_emulator = null;
        }
    }
    
    function getGameIcon(name) {
        const lower = name.toLowerCase();
        if (lower.includes('pokemon')) return '⚡';
        if (lower.includes('mario')) return '🍄';
        if (lower.includes('zelda')) return '🗡️';
        if (lower.includes('kirby')) return '⭐';
        if (lower.includes('animal crossing')) return '🏡';
        if (lower.includes('nintendogs')) return '🐕';
        if (lower.includes('brain age')) return '🧠';
        if (lower.includes('castlevania')) return '🦇';
        if (lower.includes('chrono')) return '⏳';
        if (lower.includes('final fantasy')) return '⚔️';
        if (lower.includes('dragon quest')) return '🐉';
        if (lower.includes('ace attorney')) return '⚖️';
        if (lower.includes('professor layton')) return '🎩';
        if (lower.includes('phoenix wright')) return '⚖️';
        if (lower.includes('metroid')) return '🕷️';
        if (lower.includes('star fox')) return '🦊';
        return '🎮';
    }
    
    let searchTerm = '';
    
    function renderGames() {
        let filtered = romLibrary;
        if (searchTerm) {
            filtered = romLibrary.filter(rom => 
                rom.name.toLowerCase().includes(searchTerm.toLowerCase())
            );
        }
        
        document.getElementById('totalCount').innerText = filtered.length;
        const container = document.getElementById('gamesContainer');
        
        if (filtered.length === 0) {
            container.innerHTML = `<div class="no-results">✨ no DS games found — try a different search ✨</div>`;
            return;
        }
        
        container.innerHTML = filtered.map(rom => `
            <div class="game-card" data-id="${rom.id}" data-name="${escapeHtml(rom.name)}">
                <div class="game-icon">${getGameIcon(rom.name)}</div>
                <div class="game-info">
                    <div class="game-title">
                        ${escapeHtml(rom.name)}
                        <span class="game-badge">NDS</span>
                    </div>
                    <div class="arrow-hint">▶ play fullscreen</div>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.game-card').forEach(card => {
            card.addEventListener('click', () => {
                const fileId = card.getAttribute('data-id');
                const gameName = card.getAttribute('data-name');
                loadRom(fileId, gameName);
            });
        });
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    async function init() {
        const container = document.getElementById('gamesContainer');
        container.innerHTML = '<div class="no-results"><div style="text-align:center"><div style="width:40px;height:40px;border:3px solid rgba(255,204,102,0.2);border-top-color:#ffcc66;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 15px"></div><p>Loading DS library...</p></div></div>';
        
        try {
            romLibrary = await fetchDriveFolder();
            renderGames();
        } catch (error) {
            console.error(error);
            container.innerHTML = `<div class="no-results"><p>Error loading ROMs: ${error.message}</p><p style="margin-top:10px;font-size:12px">Make sure the Google Drive folder is public</p></div>`;
        }
    }
    
    let debounceTimer;
    document.getElementById('searchInput').addEventListener('input', (e) => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
            searchTerm = e.target.value.trim();
            renderGames();
        }, 250);
    });
    
    document.getElementById('fullscreenCloseBtn').addEventListener('click', closeFullscreenEmulator);
    document.getElementById('fullscreenModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('fullscreenModal')) closeFullscreenEmulator();
    });
    
    document.addEventListener('keydown', (e) => {
        if (document.getElementById('fullscreenModal').classList.contains('active') && e.key === 'Escape') {
            closeFullscreenEmulator();
        }
    });
    
    init();
</script>
</body>
</html>
