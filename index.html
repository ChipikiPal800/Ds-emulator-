<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Nintendo DS Hub | fanterOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { height: 100%; }
        
        /* ===== FANTER GOLD/GLASS THEME ===== */
        :root {
            --fg-default: #f0f0ff;
            --fg-muted: #a0a0c0;
            --fg-subtle: #606080;
            --success-fg: #4cd964;
            --success-emphasis: #3da35d;
            --attention-fg: #ffcc00;
            
            --canvas-default: #0a0a0f;
            --canvas-subtle: rgba(15, 15, 25, 0.85);
            --canvas-inset: rgba(5, 5, 12, 0.95);
            --border-default: rgba(124, 92, 255, 0.3);
            --border-muted: rgba(255, 255, 255, 0.08);
            --accent-fg: #ffcc66;
            --accent-emphasis: #7c5cff;
            --btn-gradient: linear-gradient(135deg, #7c5cff, #5a3cc9);
            --btn-shadow: #3a2a80;
            --glow-color: rgba(124, 92, 255, 0.15);
        }
        
        body.theme-pokemon { --accent-fg: #ffd93d; --accent-emphasis: #f0c000; --btn-gradient: linear-gradient(145deg, #f0c000, #d4a800); }
        body.theme-mario { --accent-fg: #ff6b6b; --accent-emphasis: #e74c3c; --btn-gradient: linear-gradient(145deg, #e74c3c, #c0392b); }
        body.theme-zelda { --accent-fg: #90ee90; --accent-emphasis: #5cb85c; --btn-gradient: linear-gradient(145deg, #5cb85c, #449d44); }
        body.theme-kirby { --accent-fg: #ffb6c1; --accent-emphasis: #ff69b4; --btn-gradient: linear-gradient(145deg, #ff69b4, #db5090); }
        
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            min-height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 10px;
            padding-top: max(10px, env(safe-area-inset-top));
            padding-bottom: max(10px, env(safe-area-inset-bottom));
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            overflow-x: hidden;
        }
        
        .container { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; max-width: 500px; }
        
        .header { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            padding: 8px 16px; 
            background: var(--canvas-subtle);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-default); 
            border-radius: 16px; 
            width: 100%; 
            max-width: 380px; 
        }
        .header-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .header-title { display: flex; flex-direction: column; }
        .header-main { 
            color: var(--fg-default); 
            font-size: 16px; 
            font-weight: 700;
            background: linear-gradient(135deg, #f5e6b2, #ffcc66, #ffaa33);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .header-sub { color: var(--fg-muted); font-size: 11px; font-family: 'JetBrains Mono', monospace; }
        .header-badge { 
            margin-left: auto; 
            background: linear-gradient(135deg, var(--accent-emphasis), var(--accent-emphasis));
            color: white; 
            font-size: 10px; 
            font-weight: 600; 
            padding: 4px 12px; 
            border-radius: 20px; 
            cursor: pointer; 
            transition: all 0.2s;
        }
        .header-badge:hover { transform: scale(1.02); box-shadow: 0 0 12px rgba(124, 92, 255, 0.4); }
        
        .console-body { 
            width: min(380px, 95vw); 
            background: var(--canvas-subtle);
            backdrop-filter: blur(20px);
            border-radius: 20px; 
            padding: 16px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.4); 
            border: 1px solid var(--border-default); 
        }
        .console-label { 
            color: var(--accent-fg); 
            font-size: 10px; 
            font-family: 'JetBrains Mono', monospace; 
            font-weight: bold; 
            letter-spacing: 2px; 
            text-align: center; 
            margin-bottom: 8px; 
        }
        .screen-area { 
            width: 100%; 
            background: var(--canvas-inset); 
            border-radius: 12px; 
            padding: 10px; 
            box-shadow: inset 0 4px 15px rgba(0,0,0,0.8); 
            border: 1px solid var(--border-muted);
        }
        .options-row { display: flex; justify-content: flex-end; width: 100%; padding: 0 5px; margin-bottom: 8px; }
        .options-btn { 
            background: rgba(124, 92, 255, 0.2); 
            border: 1px solid rgba(124, 92, 255, 0.3); 
            border-radius: 20px; 
            color: #ffdd99; 
            font-size: 9px; 
            font-family: 'JetBrains Mono', monospace; 
            padding: 4px 12px; 
            cursor: pointer; 
        }
        #game-wrapper { width: 100%; background: #000; border-radius: 8px; overflow: hidden; position: relative; min-height: 200px; }
        desmond-player { display: block; width: 100%; }
        .game-placeholder { text-align: center; color: var(--fg-subtle); padding: 20px; }
        .screen-divider { position: absolute; left: 0; right: 0; top: 50%; height: 2px; background: var(--accent-fg); z-index: 10; pointer-events: none; opacity: 0.3; }
        
        .controller { 
            width: min(380px, 95vw); 
            background: var(--canvas-subtle);
            backdrop-filter: blur(20px);
            border-radius: 20px; 
            padding: 15px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.3); 
            border: 1px solid var(--border-default); 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        .controls-row { display: flex; justify-content: space-between; align-items: center; padding: 0 10px; }
        .shoulder-btns { display: flex; justify-content: space-between; padding: 0 10px; gap: 8px; }
        .shoulder-btn { 
            flex: 1; 
            height: 32px; 
            background: var(--btn-gradient); 
            border: none; 
            border-radius: 16px; 
            color: var(--fg-default); 
            font-size: 11px; 
            font-weight: bold; 
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
            transition: all 0.1s;
        }
        .shoulder-btn:active, .shoulder-btn.pressed { transform: translateY(2px); opacity: 0.8; }
        
        .dpad { width: 100px; height: 100px; position: relative; }
        .dpad-btn { 
            position: absolute; 
            background: linear-gradient(145deg, var(--canvas-subtle), var(--canvas-inset)); 
            border: 2px solid var(--border-muted); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: var(--fg-muted); 
            font-size: 16px;
            cursor: pointer;
        }
        .dpad-btn:active, .dpad-btn.pressed { background: var(--btn-gradient); color: var(--fg-default); }
        .dpad-up, .dpad-down { width: 34px; height: 36px; left: 33px; }
        .dpad-up { top: 0; border-radius: 6px 6px 0 0; }
        .dpad-down { bottom: 0; border-radius: 0 0 6px 6px; }
        .dpad-left, .dpad-right { width: 36px; height: 34px; top: 33px; }
        .dpad-left { left: 0; border-radius: 6px 0 0 6px; }
        .dpad-right { right: 0; border-radius: 0 6px 6px 0; }
        .dpad-center { position: absolute; width: 34px; height: 34px; top: 33px; left: 33px; background: var(--canvas-inset); border: 2px solid var(--border-muted); }
        
        .action-btns-grid { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .action-row { display: flex; gap: 30px; }
        .action-btn { 
            width: 42px; 
            height: 42px; 
            border-radius: 50%; 
            background: var(--btn-gradient); 
            border: none; 
            font-weight: bold; 
            font-size: 14px; 
            font-family: 'JetBrains Mono', monospace; 
            color: var(--fg-default); 
            box-shadow: 0 3px 0 var(--btn-shadow);
            cursor: pointer;
            transition: all 0.05s linear;
        }
        .action-btn:active, .action-btn.pressed { transform: translateY(2px); box-shadow: 0 1px 0 var(--btn-shadow); }
        
        .menu-btns { display: flex; justify-content: center; gap: 15px; }
        .menu-btn { 
            width: 60px; 
            height: 22px; 
            background: rgba(124, 92, 255, 0.2); 
            border: 1px solid rgba(124, 92, 255, 0.3); 
            border-radius: 20px; 
            color: #ffdd99; 
            font-size: 8px; 
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
        }
        .menu-btn:active, .menu-btn.pressed { background: var(--btn-gradient); color: var(--fg-default); }
        
        .brand { text-align: center; color: var(--accent-fg); font-size: 11px; font-family: 'JetBrains Mono', monospace; font-weight: bold; letter-spacing: 2px; margin-top: 5px; }
        
        .status { color: var(--fg-muted); font-size: 11px; text-align: center; font-family: 'JetBrains Mono', monospace; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .status-row { display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--fg-subtle); }
        .status-dot.success { background: var(--success-fg); animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); z-index: 1000; justify-content: center; align-items: center; padding: 10px; }
        .modal.show { display: flex; }
        .modal-content { 
            background: var(--canvas-subtle);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-default); 
            border-radius: 20px; 
            padding: 20px; 
            width: min(380px, 95vw); 
            max-height: 85vh; 
            overflow-y: auto; 
        }
        .modal-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border-default); }
        .modal-header svg { width: 24px; height: 24px; fill: var(--accent-fg); }
        .modal-title { color: var(--fg-default); font-size: 18px; font-weight: 700; }
        .modal-option { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--border-muted); border-radius: 12px; margin-bottom: 8px; }
        .modal-option label { color: var(--fg-default); font-size: 13px; font-weight: 500; }
        .modal-option button, .modal-option select { 
            background: var(--btn-gradient); 
            border: none; 
            border-radius: 20px; 
            padding: 6px 14px; 
            font-size: 12px; 
            font-weight: 600; 
            color: white; 
            cursor: pointer; 
        }
        .modal-close { 
            display: block; 
            width: 100%; 
            margin-top: 12px; 
            padding: 10px; 
            background: var(--btn-gradient);
            border: none; 
            border-radius: 30px; 
            color: white; 
            font-size: 14px; 
            font-weight: 600; 
            cursor: pointer; 
        }
        
        .search-box { position: relative; margin-bottom: 10px; }
        .search-input { 
            width: 100%; 
            padding: 10px 12px 10px 36px; 
            background: rgba(0,0,0,0.3); 
            border: 1px solid var(--border-default); 
            border-radius: 30px; 
            color: var(--fg-default); 
            font-size: 13px; 
        }
        .search-input:focus { outline: none; border-color: var(--accent-fg); box-shadow: 0 0 12px rgba(124, 92, 255, 0.2); }
        .search-box svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; fill: var(--fg-subtle); }
        .rom-count { color: var(--accent-fg); font-size: 11px; font-family: 'JetBrains Mono', monospace; margin-bottom: 8px; }
        .rom-library { max-height: 300px; overflow-y: auto; margin-bottom: 10px; }
        .rom-item { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            padding: 10px; 
            background: rgba(0,0,0,0.2); 
            border: 1px solid var(--border-muted); 
            border-radius: 12px; 
            margin-bottom: 6px; 
            cursor: pointer; 
            transition: all 0.15s; 
        }
        .rom-item:hover { border-color: var(--accent-fg); background: rgba(124, 92, 255, 0.1); }
        .rom-icon { width: 32px; height: 32px; background: var(--btn-gradient); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .rom-icon svg { width: 16px; height: 16px; fill: white; }
        .rom-name { color: var(--fg-default); font-size: 13px; font-weight: 500; }
        .rom-play { 
            background: var(--btn-gradient); 
            border: none; 
            border-radius: 20px; 
            color: white; 
            font-size: 11px; 
            font-weight: 600; 
            padding: 4px 12px; 
            cursor: pointer; 
        }
        
        .file-label { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            padding: 10px; 
            background: rgba(0,0,0,0.3); 
            border: 1px dashed var(--border-default); 
            border-radius: 30px; 
            color: var(--fg-muted); 
            font-size: 12px; 
            cursor: pointer; 
        }
        .hidden { display: none; }
        .spinner { width: 30px; height: 30px; border: 3px solid var(--border-muted); border-top-color: var(--accent-fg); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-icon">🎮</div>
            <div class="header-title">
                <span class="header-main">🏟️ fanterOS · NDS HUB</span>
                <span class="header-sub">Nintendo DS</span>
            </div>
            <span class="header-badge" id="library-btn">LIBRARY</span>
        </div>

        <div class="console-body">
            <div class="console-label">⚡ NINTENDO DS ⚡</div>
            <div class="screen-area">
                <div class="options-row">
                    <button class="options-btn" id="options-btn">⚙ Settings</button>
                </div>
                <div style="position:relative;">
                    <div id="game-wrapper">
                        <desmond-player id="player"></desmond-player>
                        <div class="game-placeholder" id="game-placeholder">
                            <svg viewBox="0 0 16 16" width="48" height="48"><path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0ZM1.5 8a6.5 6.5 0 1 0 13 0 6.5 6.5 0 0 0-13 0Zm4.879-2.773 4.264 2.559a.25.25 0 0 1 0 .428l-4.264 2.559A.25.25 0 0 1 6 10.559V5.442a.25.25 0 0 1 .379-.215Z"/></svg>
                            <p>Select a ROM from Library</p>
                        </div>
                    </div>
                    <div class="screen-divider" id="screen-divider"></div>
                </div>
            </div>
        </div>
        
        <div class="controller">
            <div class="shoulder-btns">
                <button class="shoulder-btn" id="btn-l">L</button>
                <button class="shoulder-btn" id="btn-r">R</button>
            </div>
            <div class="controls-row">
                <div class="dpad">
                    <button class="dpad-btn dpad-up" id="btn-up">▲</button>
                    <button class="dpad-btn dpad-down" id="btn-down">▼</button>
                    <button class="dpad-btn dpad-left" id="btn-left">◀</button>
                    <button class="dpad-btn dpad-right" id="btn-right">▶</button>
                    <div class="dpad-center"></div>
                </div>
                <div class="action-btns-grid">
                    <button class="action-btn btn-x" id="btn-x">X</button>
                    <div class="action-row">
                        <button class="action-btn btn-y" id="btn-y">Y</button>
                        <button class="action-btn btn-a" id="btn-a">A</button>
                    </div>
                    <button class="action-btn btn-b" id="btn-b">B</button>
                </div>
            </div>
            <div class="menu-btns">
                <button class="menu-btn" id="btn-select">SELECT</button>
                <button class="menu-btn" id="btn-start">START</button>
            </div>
        </div>
        
        <div class="status" id="status">
            <div class="status-row">
                <span class="status-dot" id="status-dot"></span>
                <span id="status-text">Click LIBRARY to browse ROMs</span>
            </div>
        </div>
    </div>
    
    <div class="modal" id="library-modal">
        <div class="modal-content">
            <div class="modal-header">
                <svg viewBox="0 0 16 16"><path d="M0 1.75A.75.75 0 0 1 .75 1h4.253c1.227 0 2.317.59 3 1.501A3.743 3.743 0 0 1 11.006 1h4.245a.75.75 0 0 1 .75.75v10.5a.75.75 0 0 1-.75.75h-4.507a2.25 2.25 0 0 0-1.591.659l-.622.621a.75.75 0 0 1-1.06 0l-.622-.621A2.25 2.25 0 0 0 5.258 13H.75a.75.75 0 0 1-.75-.75Z"/></svg>
                <span class="modal-title">ROM Library</span>
            </div>
            <div class="search-box">
                <svg viewBox="0 0 16 16"><path d="M10.68 11.74a6 6 0 0 1-7.922-8.982 6 6 0 0 1 8.982 7.922l3.04 3.04a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215ZM11.5 7a4.499 4.499 0 1 0-8.997 0A4.499 4.499 0 0 0 11.5 7Z"/></svg>
                <input type="text" class="search-input" id="search-input" placeholder="Search ROMs...">
            </div>
            <div class="rom-count" id="rom-count">0 ROMs</div>
            <div class="rom-library" id="rom-library"></div>
            <label class="file-label">
                <svg viewBox="0 0 16 16"><path d="M3.5 1.75v11.5c0 .09.048.173.126.217a.75.75 0 0 1-.752 1.298A1.748 1.748 0 0 1 2 13.25V1.75C2 .784 2.784 0 3.75 0h5.586c.464 0 .909.185 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v8.586A1.75 1.75 0 0 1 12.25 15h-7a.75.75 0 0 1 0-1.5h7a.25.25 0 0 0 .25-.25V4.664a.25.25 0 0 0-.073-.177L9.513 1.573a.25.25 0 0 0-.177-.073H3.75a.25.25 0 0 0-.25.25Z"/></svg>
                Or upload from device
                <input type="file" class="hidden" id="local-file" accept=".nds,.NDS,.zip">
            </label>
            <button class="modal-close" id="library-close">Close</button>
        </div>
    </div>
    
    <div class="modal" id="settings-modal">
        <div class="modal-content">
            <div class="modal-header">
                <svg viewBox="0 0 16 16"><path d="M8 0a8.2 8.2 0 0 1 .701.031C6.444.095 5.393.895 4.939 2H2.375A2.375 2.375 0 0 0 0 4.375v2.25A2.375 2.375 0 0 0 2.375 9h.666c.09.342.22.668.386.974L1.22 12.18a1.5 1.5 0 0 0 0 2.121l.5.5a1.5 1.5 0 0 0 2.121 0l2.206-2.207c.166-.306.296-.632.386-.974h.666A2.375 2.375 0 0 0 16 6.625v-2.25A2.375 2.375 0 0 0 13.625 2h-2.564c-.454-1.105-1.505-1.905-2.76-1.969A8.2 8.2 0 0 1 8 0Z"/></svg>
                <span class="modal-title">Settings</span>
            </div>
            <div class="modal-option">
                <label>Theme</label>
                <select id="theme-select">
                    <option value="">Classic NDS</option>
                    <option value="theme-pokemon">Pokemon</option>
                    <option value="theme-mario">Mario</option>
                    <option value="theme-zelda">Zelda</option>
                    <option value="theme-kirby">Kirby</option>
                </select>
            </div>
            <div class="modal-option"><label>Download ROM</label><button id="download-rom-btn">💾 DOWNLOAD</button></div>
            <button class="modal-close" id="settings-close">Close</button>
        </div>
    </div>

    <script>
        // ============ STATIC GAME LIST - ADD YOUR GOOGLE DRIVE FILE IDs HERE ============
        // To get a File ID: Right-click the file in Google Drive → "Get link" → 
        // Copy the ID from: https://drive.google.com/file/d/YOUR_FILE_ID_HERE/view
        
        const romLibrary = [
            // Add your games like this:
            // { id: 'YOUR_GOOGLE_DRIVE_FILE_ID', name: 'Game Name' },
            { id: 'https://drive.google.com/file/d/1mgQk0Q08LzBeytQY2d8tfZGlLg96p2Ho/view', name: 'Yoshi Touch & Go (USA, Australia).nds
' }
        ];
        
        let currentRomName = '';
        let currentRomBlob = null;
        
        // Theme handling
        const savedTheme = localStorage.getItem('nds-theme') || '';
        if (savedTheme) document.body.classList.add(savedTheme);
        document.getElementById('theme-select').value = savedTheme;
        document.getElementById('theme-select').addEventListener('change', (e) => {
            document.body.className = document.body.className.replace(/theme-\S+/g, '').trim();
            if (e.target.value) document.body.classList.add(e.target.value);
            localStorage.setItem('nds-theme', e.target.value);
        });
        
        // Download ROM from Google Drive using direct URL
        async function downloadRom(fileId) {
            if (!fileId) throw new Error('No File ID provided');
            
            const directUrl = `https://drive.usercontent.google.com/download?id=${fileId}&export=download&confirm=t`;
            const response = await fetch(directUrl);
            if (!response.ok) throw new Error('Download failed');
            return await response.blob();
        }
        
        // Load and play ROM
        async function loadRom(fileId, name) {
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            
            statusDot.className = 'status-dot warning';
            statusText.textContent = `Loading ${name}...`;
            document.getElementById('library-modal').classList.remove('show');
            
            try {
                const blob = await downloadRom(fileId);
                currentRomName = name;
                currentRomBlob = blob;
                initEmulator(URL.createObjectURL(blob), name);
            } catch (error) {
                console.error('Load error:', error);
                statusDot.className = 'status-dot';
                statusText.textContent = 'Failed to load ROM';
                alert('Failed to load ROM: ' + error.message);
            }
        }
        
        // Render game list
        function renderRomList() {
            const library = document.getElementById('rom-library');
            if (romLibrary.length === 0) {
                library.innerHTML = '<div class="spinner"></div><p>No games added. Edit the romLibrary array in the code.</p>';
                document.getElementById('rom-count').textContent = '0 ROMs';
                return;
            }
            
            document.getElementById('rom-count').textContent = `${romLibrary.length} ROMs`;
            library.innerHTML = romLibrary.map((rom, i) => `
                <div class="rom-item" data-index="${i}">
                    <div class="rom-icon"><svg viewBox="0 0 16 16"><path d="M14.5 3H12V1.5a.5.5 0 0 0-.5-.5h-9a.5.5 0 0 0-.5.5V3H1.5A1.5 1.5 0 0 0 0 4.5v9A1.5 1.5 0 0 0 1.5 15h13a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 14.5 3Z"/></svg></div>
                    <div class="rom-info">
                        <div class="rom-name">${escapeHtml(rom.name)}</div>
                    </div>
                    <button class="rom-play">▶ Play</button>
                </div>
            `).join('');
            
            library.querySelectorAll('.rom-item').forEach(el => {
                el.addEventListener('click', () => {
                    const rom = romLibrary[parseInt(el.dataset.index)];
                    if (rom.id) {
                        loadRom(rom.id, rom.name);
                    } else {
                        alert('No File ID set for this game. Edit the romLibrary array.');
                    }
                });
            });
        }
        
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Desmond Emulator
        let desmondLoaded = false;
        function initEmulator(romUrl, gameName) {
            const ph = document.getElementById('game-placeholder');
            if (ph) ph.style.display = 'none';
            
            document.getElementById('status-text').textContent = 'Loading emulator...';
            
            function doLoad() {
                const player = document.getElementById('player');
                player.loadURL(romUrl, () => {
                    document.getElementById('status-text').textContent = 'Ready to play!';
                    document.getElementById('status-dot').className = 'status-dot success';
                });
            }
            
            if (!desmondLoaded) {
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/gh/js-emulators/desmond/dist/desmond.min.js';
                script.onload = () => { desmondLoaded = true; doLoad(); };
                document.head.appendChild(script);
            } else {
                const wrapper = document.getElementById('game-wrapper');
                const oldPlayer = document.getElementById('player');
                if (oldPlayer) oldPlayer.remove();
                const newPlayer = document.createElement('desmond-player');
                newPlayer.id = 'player';
                wrapper.insertBefore(newPlayer, wrapper.firstChild);
                doLoad();
            }
        }
        
        // Controls
        function setupControls() {
            const btnKeyMap = {
                "btn-a": 88, "btn-b": 90, "btn-x": 83, "btn-y": 65,
                "btn-l": 81, "btn-r": 87, "btn-select": 16, "btn-start": 13,
                "btn-up": 38, "btn-down": 40, "btn-left": 37, "btn-right": 39
            };
            
            function fireKey(keyCode, type) {
                window.dispatchEvent(new KeyboardEvent(type, { keyCode, which: keyCode, bubbles: true }));
            }
            
            Object.entries(btnKeyMap).forEach(([id, keyCode]) => {
                const btn = document.getElementById(id);
                if (!btn) return;
                const press = () => { btn.classList.add('pressed'); fireKey(keyCode, 'keydown'); };
                const release = () => { btn.classList.remove('pressed'); fireKey(keyCode, 'keyup'); };
                btn.addEventListener('touchstart', e => { e.preventDefault(); press(); }, { passive: false });
                btn.addEventListener('touchend', e => { e.preventDefault(); release(); }, { passive: false });
                btn.addEventListener('touchcancel', e => { e.preventDefault(); release(); }, { passive: false });
                btn.addEventListener('mousedown', e => { e.preventDefault(); press(); });
                btn.addEventListener('mouseup', e => { e.preventDefault(); release(); });
                btn.addEventListener('mouseleave', release);
            });
        }
        setupControls();
        
        // Handle local file upload
        document.getElementById('local-file').addEventListener('change', async e => {
            const file = e.target.files[0];
            if (!file) return;
            let romBlob = file;
            let romName = file.name.replace(/\.(nds|zip)$/i, '');
            
            if (file.name.toLowerCase().endsWith('.zip')) {
                // Load JSZip if needed
                if (!window.JSZip) {
                    await new Promise((resolve) => {
                        const script = document.createElement('script');
                        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
                        script.onload = resolve;
                        document.head.appendChild(script);
                    });
                }
                if (window.JSZip) {
                    const zip = await JSZip.loadAsync(file);
                    const ndsFile = Object.keys(zip.files).find(f => f.toLowerCase().endsWith('.nds'));
                    if (ndsFile) {
                        romBlob = await zip.files[ndsFile].async('blob');
                        romName = ndsFile.replace(/\.nds$/i, '');
                    }
                }
            }
            
            currentRomName = romName;
            currentRomBlob = romBlob;
            initEmulator(URL.createObjectURL(romBlob), romName);
            document.getElementById('library-modal').classList.remove('show');
            e.target.value = '';
        });
        
        // Download ROM button
        document.getElementById('download-rom-btn').addEventListener('click', () => {
            if (!currentRomName || !currentRomBlob) {
                alert('No game loaded. Load a game first.');
                return;
            }
            const link = document.createElement('a');
            link.download = `${currentRomName}.nds`;
            link.href = URL.createObjectURL(currentRomBlob);
            link.click();
            URL.revokeObjectURL(link.href);
        });
        
        // Modal handling
        const libraryModal = document.getElementById('library-modal');
        const settingsModal = document.getElementById('settings-modal');
        
        document.getElementById('library-btn').addEventListener('click', () => {
            libraryModal.classList.add('show');
            renderRomList();
        });
        document.getElementById('library-close').addEventListener('click', () => libraryModal.classList.remove('show'));
        libraryModal.addEventListener('click', e => { if (e.target === libraryModal) libraryModal.classList.remove('show'); });
        
        document.getElementById('options-btn').addEventListener('click', () => settingsModal.classList.add('show'));
        document.getElementById('settings-close').addEventListener('click', () => settingsModal.classList.remove('show'));
        settingsModal.addEventListener('click', e => { if (e.target === settingsModal) settingsModal.classList.remove('show'); });
        
        // Search functionality
        let searchTerm = '';
        let filteredRoms = [...romLibrary];
        
        function updateSearch() {
            if (!searchTerm) {
                filteredRoms = [...romLibrary];
            } else {
                filteredRoms = romLibrary.filter(rom => 
                    rom.name.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }
            renderRomList();
            document.getElementById('rom-count').textContent = `${filteredRoms.length} of ${romLibrary.length} ROMs`;
        }
        
        document.getElementById('search-input').addEventListener('input', (e) => {
            searchTerm = e.target.value;
            updateSearch();
        });
        
        // Audio context resume
        ['touchstart', 'click'].forEach(evt => document.addEventListener(evt, () => {
            new (window.AudioContext || window.webkitAudioContext)().resume();
        }, { once: true }));
        
        // Initial render
        renderRomList();
    </script>
</body>
</html>
